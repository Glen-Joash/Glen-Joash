<!DOCTYPE html>

<head>

<title>Contact | Glen Joash</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1f4037, #99f2c8);
    color: #333;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.7);

nav a {

}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

.contact-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    color: #1f4037;
}

.info {
    margin-bottom: 20px;
}

.info p {
    margin: 5px 0;
}

form input, form textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #1f4037;
    color: white;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
}

button:hover {
    background: #14532d;
}

.footer {
    text-align: center;
    margin-top: 15px;
}

.footer a {
    text-decoration: none;
    color: #1f4037;
    font-weight: bold;
}
</style>
</head>
